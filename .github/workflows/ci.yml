name: SentiLife CI

# Runs on every push to any branch and on every PR targeting main or dev.
# Tests must pass before any deployment is allowed.
# Build & deploy only happen on pushes to main.

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  # ── Java backend tests (Spring Boot 3, H2 in-memory) ──────────────────────
  test-java:
    name: ☕ Java — mvn test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: mvn test -B -q

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: java-test-reports
          path: backend/target/surefire-reports/

  # ── Python inference service tests (FastAPI) ───────────────────────────────
  test-python:
    name: 🐍 Python — pytest
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: inference

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: inference/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx

      - name: Lint (import check)
        run: python -c "from api.main import app"

      - name: Run pytest
        env:
          PYTHONPATH: ${{ github.workspace }}/inference
        run: pytest tests/ -v --tb=short

  # ── Flutter tests (analyze + unit tests) ──────────────────────────────────
  test-flutter:
    name: 🦋 Flutter — analyze + test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java (required by Flutter toolchain)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run unit tests
        run: flutter test --reporter=github

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-test-results
          path: frontend/test/

  # ── Build & push Docker images (only on main, all tests must pass) ─────────
  build-and-push:
    name: 🐳 Build & push images
    runs-on: ubuntu-latest
    needs: [test-java, test-python, test-flutter]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" \
            | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build & push Java backend image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/sentilife-java:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/sentilife-java:${{ github.sha }} \
            ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/sentilife-java:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/sentilife-java:${{ github.sha }}

      - name: Build & push inference service image
        run: |
          docker build \
            -f inference/Dockerfile \
            -t ${{ secrets.DOCKER_USERNAME }}/sentilife-inference:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/sentilife-inference:${{ github.sha }} \
            .
          docker push ${{ secrets.DOCKER_USERNAME }}/sentilife-inference:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/sentilife-inference:${{ github.sha }}

      - name: Build & push assistant agent image
        run: |
          docker build \
            -f assistant/Dockerfile \
            -t ${{ secrets.DOCKER_USERNAME }}/sentilife-assistant:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/sentilife-assistant:${{ github.sha }} \
            .
          docker push ${{ secrets.DOCKER_USERNAME }}/sentilife-assistant:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/sentilife-assistant:${{ github.sha }}

  # ── Deploy to EC2 (only after successful build on main) ────────────────────
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH key
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${EC2_HOST:-}" ]; then
            echo "::error::EC2_HOST está vacío. El job deploy usa environment 'production':"
            echo "  Settings → Environments → production → Environment secrets"
            echo "  (o Repository secrets, si no hay override vacío en production)."
            exit 1
          fi
          if [ -z "${EC2_SSH_KEY:-}" ]; then
            echo "::error::EC2_SSH_KEY está vacío. Misma ubicación que EC2_HOST."
            exit 1
          fi

          EC2_HOST="$(printf '%s' "$EC2_HOST" | tr -d '[:space:]')"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem

          if ! ssh-keyscan -T 15 -H "$EC2_HOST" >> ~/.ssh/known_hosts 2> /tmp/ssh-keyscan.err; then
            echo "::error::ssh-keyscan falló para EC2_HOST=${EC2_HOST}"
            echo "  → Security Group: inbound TCP 22 desde GitHub Actions (0.0.0.0/0 para CI)."
            echo "  → EC2_HOST debe ser solo IP o hostname (sin http:// ni :8005)."
            cat /tmp/ssh-keyscan.err
            exit 1
          fi

          echo "SSH listo para ${EC2_HOST}"

      - name: Upload compose and configs to EC2
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=20 -o TCPKeepAlive=yes \
            -i ~/.ssh/ec2_key.pem \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "mkdir -p ~/sentilife/backend/config \
                       ~/sentilife/backend/observability/grafana/provisioning/dashboards \
                       ~/sentilife/backend/observability/grafana/provisioning/datasources \
                       ~/sentilife/backend/observability/grafana/dashboards"

          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/firebase-service-account.json
          scp -i ~/.ssh/ec2_key.pem \
            /tmp/firebase-service-account.json \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/sentilife/backend/config/firebase-service-account.json
          rm -f /tmp/firebase-service-account.json

          scp -o ServerAliveInterval=30 -o ServerAliveCountMax=20 -o TCPKeepAlive=yes \
            -i ~/.ssh/ec2_key.pem \
            docker-compose.prod.yml \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/sentilife/docker-compose.prod.yml

          scp -i ~/.ssh/ec2_key.pem \
            backend/observability/prometheus.yml \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/sentilife/backend/observability/prometheus.yml

          scp -i ~/.ssh/ec2_key.pem -r \
            backend/observability/grafana/provisioning \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/sentilife/backend/observability/grafana/

          scp -i ~/.ssh/ec2_key.pem -r \
            backend/observability/grafana/dashboards \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/sentilife/backend/observability/grafana/

      - name: Deploy on EC2
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=20 -o TCPKeepAlive=yes \
            -i ~/.ssh/ec2_key.pem \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            bash -s << 'ENDSSH'
            set -e

            echo "${{ secrets.DOCKER_PASSWORD }}" \
              | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            echo "=== Espacio en disco antes del deploy ==="
            df -h /
            docker system df || true

            # EC2 compartido: imágenes/caché viejas llenan el disco (24 GB) y fallan los pull
            echo "=== Limpieza Docker (sin borrar volúmenes de BD en uso) ==="
            docker system prune -af || true
            docker builder prune -af || true

            echo "=== Espacio tras limpieza ==="
            df -h /
            docker system df || true

            docker pull ${{ secrets.DOCKER_USERNAME }}/sentilife-java:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/sentilife-inference:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/sentilife-assistant:latest

            cd ~/sentilife

            echo "=== Pre-deploy: liberar puertos SentiLife (5435, 8005, 3006) ==="

            # Stack Python legacy — sigue ocupando 8005/5435 si no se detiene explícitamente
            for c in fallsentinel_api fallsentinel_db; do
              if docker ps -a --format '{{.Names}}' | grep -qx "$c"; then
                echo "→ Deteniendo legacy $c"
                docker rm -f "$c"
              fi
            done

            # Stack SentiLife anterior (mismo compose) — forzar parada completa
            docker compose -f docker-compose.prod.yml down --remove-orphans 2>/dev/null || true
            # Huérfanos fuera del compose project (p. ej. db borrada a mano)
            for c in sentilife-db sentilife-backend sentilife-inference sentilife-assistant \
                     sentilife-rabbitmq sentilife-prometheus sentilife-grafana; do
              docker rm -f "$c" 2>/dev/null || true
            done

            POSTGRES_USER="${{ secrets.POSTGRES_USER }}"
            POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"
            POSTGRES_DB="${{ secrets.POSTGRES_DB }}"
            POSTGRES_USER="${POSTGRES_USER:-fallsentinel}"
            POSTGRES_PASSWORD="${POSTGRES_PASSWORD:-fallsentinel123}"
            POSTGRES_DB="${POSTGRES_DB:-fallsentinel}"

            reset_pgdata_if_corrupt() {
              local pg_volume="sentilife_pgdata"
              if ! docker volume inspect "$pg_volume" >/dev/null 2>&1; then
                echo "→ Sin volumen pgdata previo (instalación limpia)"
                return 0
              fi

              echo "=== Comprobando estado Flyway en pgdata ==="
              DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}" \
              POSTGRES_USER="$POSTGRES_USER" \
              POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
              POSTGRES_DB="$POSTGRES_DB" \
                docker compose -f docker-compose.prod.yml up -d db

              for i in $(seq 1 30); do
                if docker exec sentilife-db pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" >/dev/null 2>&1; then
                  break
                fi
                sleep 2
              done

              USERS_OK=$(docker exec sentilife-db psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -tAc \
                "SELECT to_regclass('public.users') IS NOT NULL;" 2>/dev/null | tr -d '[:space:]' || echo "f")
              PUBLIC_TABLES=$(docker exec sentilife-db psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -tAc \
                "SELECT count(*) FROM information_schema.tables WHERE table_schema='public';" 2>/dev/null | tr -d '[:space:]' || echo "0")

              echo "→ Diagnóstico pgdata: users=${USERS_OK}, public_tables=${PUBLIC_TABLES}"

              docker compose -f docker-compose.prod.yml down --remove-orphans 2>/dev/null || true

              # BD con tablas pero sin users = Flyway legacy/baseline roto → borrar volumen
              if [ "$USERS_OK" != "t" ] && [ "${PUBLIC_TABLES:-0}" -gt 0 ]; then
                echo "→ pgdata CORRUPTO. Borrando volumen ${pg_volume}..."
                docker volume rm "$pg_volume"
              fi
            }

            reset_pgdata_if_corrupt

            wait_for_db() {
              echo "→ Esperando PostgreSQL (hasta ~2 min)..."
              for i in $(seq 1 24); do
                if docker ps --filter name=sentilife-db --filter status=running --format '{{.Names}}' | grep -qx sentilife-db \
                  && docker exec sentilife-db pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" >/dev/null 2>&1; then
                  echo "→ PostgreSQL OK tras ${i}0s"
                  return 0
                fi
                sleep 5
              done
              echo "→ PostgreSQL no arrancó. Estado:"
              docker ps -a --filter name=sentilife-db
              docker logs sentilife-db --tail 40 2>/dev/null || true
              return 1
            }

            deploy_stack() {
              DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}" \
              POSTGRES_USER="$POSTGRES_USER" \
              POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
              POSTGRES_DB="$POSTGRES_DB" \
              JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
                docker compose -f docker-compose.prod.yml up -d --remove-orphans --force-recreate --pull always \
                db rabbitmq api assistant backend
            }

            deploy_observability() {
              DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}" \
              POSTGRES_USER="$POSTGRES_USER" \
              POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
              POSTGRES_DB="$POSTGRES_DB" \
              JWT_SECRET="${{ secrets.JWT_SECRET }}" \
                docker compose -f docker-compose.prod.yml up -d prometheus grafana --no-wait 2>/dev/null \
                || DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}" \
                   POSTGRES_USER="$POSTGRES_USER" \
                   POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
                   POSTGRES_DB="$POSTGRES_DB" \
                   JWT_SECRET="${{ secrets.JWT_SECRET }}" \
                     docker compose -f docker-compose.prod.yml up -d prometheus grafana
            }

            wait_for_backend() {
              echo "→ Esperando backend (Flyway + Spring en EC2 lento, hasta ~6 min)..."
              for i in $(seq 1 36); do
                if curl --fail --silent http://localhost:8005/actuator/health/liveness 2>/dev/null | grep -q '"status":"UP"'; then
                  echo "→ Backend UP tras ${i}0s"
                  return 0
                fi
                sleep 10
              done
              return 1
            }

            wait_for_grafana() {
              echo "→ Esperando Grafana (:3006, hasta ~2 min)..."
              for i in $(seq 1 12); do
                if curl --fail --silent http://localhost:3006/api/health 2>/dev/null | grep -q ok; then
                  echo "→ Grafana OK tras ${i}0s"
                  return 0
                fi
                sleep 10
              done
              return 1
            }

            # Respaldo: cualquier contenedor que aún publique esos puertos
            for port in 5435 8005 3006; do
              for id in $(docker ps -q); do
                if docker port "$id" 2>/dev/null | grep -qE ":${port}($|->)"; then
                  name=$(docker inspect --format '{{.Name}}' "$id" | sed 's#^/##')
                  echo "→ Deteniendo ${name} (puerto ${port})"
                  docker rm -f "$id"
                fi
              done
            done

            deploy_stack

            if ! wait_for_db; then
              echo "::error::sentilife-db no está running/healthy tras deploy_stack"
              exit 1
            fi

            if ! wait_for_backend; then
              if docker logs sentilife-backend 2>&1 | tail -120 | grep -q 'relation "users" does not exist'; then
                echo "→ Flyway roto detectado en logs. Reseteando pgdata y reintentando..."
                docker compose -f docker-compose.prod.yml down --remove-orphans
                docker volume rm sentilife_pgdata 2>/dev/null || true
                deploy_stack
                if ! wait_for_backend; then
                  echo "→ Backend sigue caído tras reset. Logs:"
                  docker logs sentilife-backend --tail 120
                  exit 1
                fi
              else
                echo "→ Backend no respondió. Logs:"
                docker logs sentilife-backend --tail 120
                exit 1
              fi
            fi

            # Levanta Prometheus/Grafana sin recrear todo el stack
            deploy_observability

            echo "→ Contenedores SentiLife:"
            docker ps --filter name=sentilife --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
            for required in sentilife-db sentilife-backend sentilife-inference sentilife-assistant sentilife-rabbitmq; do
              if ! docker ps --filter name="$required" --filter status=running --format '{{.Names}}' | grep -qx "$required"; then
                echo "::error::Contenedor obligatorio ausente: ${required}"
                exit 1
              fi
            done

            echo "→ Checking Java backend liveness (host :8005)..."
            curl --fail --silent http://localhost:8005/actuator/health/liveness | grep '"status":"UP"'

            echo "→ Checking inference health (container interno)..."
            docker exec sentilife-inference python -c \
              "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"

            if wait_for_grafana; then
              echo "→ Grafana OK"
            else
              echo "::warning::Grafana no respondió a tiempo (API Java sí). Revisar: docker logs sentilife-grafana"
            fi

            echo "✅ Stack desplegado (Java + inference + DB; Grafana opcional en EC2 lento)"
          ENDSSH

      - name: External smoke test
        run: |
          echo "→ Verifying Java API on port 8005..."
          curl --fail --silent --retry 5 --retry-delay 10 \
            "http://${{ secrets.EC2_HOST }}:8005/actuator/health/liveness" | grep '"status":"UP"'
          echo "✅ SentiLife live on EC2:8005"
