name: Backend CI — Java + Python

on:
  push:
    branches: [main, dev, feature/backend]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  # ── Java backend tests (Spring Boot 3, H2 in-memory) ──────────────────────
  test-java:
    name: Java — mvn test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend-java

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: mvn test -B -q

      - name: Upload test results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: java-test-reports
          path: backend-java/target/surefire-reports/

  # ── Python backend tests (FastAPI inference service) ───────────────────────
  test-python:
    name: Python — pytest
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: Backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx

      - name: Verify data layout
        run: |
          test -d data/raw/sisfall
          test -d data/processed/sisfall
          test -f data/processed/sisfall/sisfall_dataset.csv
          test -d data/raw/mobiact
          test -d data/processed/mobiact
          test -d data/processed/combined
          echo "Data layout OK"

      - name: Lint (import check)
        run: python -c "from api.main import app"

      - name: Run pytest
        env:
          PYTHONPATH: ${{ github.workspace }}/Backend
        run: pytest tests/ -v --tb=short

  # ── Build & push Docker images (only on main merge) ────────────────────────
  build-and-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    needs: [test-java, test-python]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" \
            | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push Java backend image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/sentilife-java:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/sentilife-java:${{ github.sha }} \
            ./backend-java
          docker push ${{ secrets.DOCKER_USERNAME }}/sentilife-java:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/sentilife-java:${{ github.sha }}

      - name: Build and push FastAPI inference image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/sentilife-inference:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/sentilife-inference:${{ github.sha }} \
            ./Backend
          docker push ${{ secrets.DOCKER_USERNAME }}/sentilife-inference:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/sentilife-inference:${{ github.sha }}

  # ── Deploy to EC2 (only on main merge) ─────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload compose and configs
        run: |
          ssh -i ~/.ssh/ec2_key.pem \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "mkdir -p ~/sentilife/db/init ~/sentilife/observability"

          scp -i ~/.ssh/ec2_key.pem \
            docker-compose.prod.yml \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/sentilife/docker-compose.prod.yml

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/ec2_key.pem \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            bash -s << 'ENDSSH'
            set -e

            echo "${{ secrets.DOCKER_PASSWORD }}" \
              | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            docker pull ${{ secrets.DOCKER_USERNAME }}/sentilife-java:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/sentilife-inference:latest

            cd ~/sentilife
            DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}" \
              docker compose -f docker-compose.prod.yml up -d --remove-orphans

            sleep 20
            echo "→ Checking Java backend health..."
            curl --fail --silent http://localhost:8080/actuator/health | grep '"status":"UP"'
            echo "→ Checking inference health..."
            curl --fail --silent http://localhost:8000/health | grep '"status":"healthy"'
            echo "✅ All services healthy"
          ENDSSH

      - name: External smoke test
        run: |
          echo "→ Verifying externally on http://${{ secrets.EC2_HOST }}:8080..."
          curl --fail --silent --retry 3 --retry-delay 5 \
            "http://${{ secrets.EC2_HOST }}:8080/actuator/health" | grep '"status":"UP"'
          echo "✅ Deployment successful — SentiLife live"
