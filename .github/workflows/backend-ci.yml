name: Backend CI

on:
  push:
    branches: [main, dev, feature/*]
    paths:
      - 'Backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'Backend/**'

defaults:
  run:
    working-directory: Backend

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx

      - name: Verify data layout (post-refactor)
        run: |
          test -d data/raw/sisfall
          test -d data/processed/sisfall
          test -f data/processed/sisfall/sisfall_dataset.csv
          test -d data/raw/mobiact
          test -d data/processed/mobiact
          test -d data/processed/combined
          echo "Data layout OK"

      - name: Lint (import check)
        run: python -c "from api.main import app"

      - name: Run tests
        run: pytest tests/ -v --tb=short
