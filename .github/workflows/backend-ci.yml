name: Deploy Fall-Sentinel API to EC2

# Tests en dev (pre-check) y main. Build + deploy solo en main.
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: Backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx

      - name: Verify data layout
        run: |
          test -d data/raw/sisfall
          test -d data/processed/sisfall
          test -f data/processed/sisfall/sisfall_dataset.csv
          test -d data/raw/mobiact
          test -d data/processed/mobiact
          test -d data/processed/combined
          echo "Data layout OK"

      - name: Lint (import check)
        run: python -c "from api.main import app"

      - name: Run pytest
        env:
          PYTHONPATH: ${{ github.workspace }}/Backend
        run: pytest tests/ -v --tb=short

  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" \
            | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push backend image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/fallsentinel-api:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/fallsentinel-api:${{ github.sha }} \
            ./Backend
          docker push ${{ secrets.DOCKER_USERNAME }}/fallsentinel-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/fallsentinel-api:${{ github.sha }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload docker-compose.prod.yml and db init
        run: |
          ssh -i ~/.ssh/ec2_key.pem \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "mkdir -p ~/fallsentinel/db/init"

          scp -i ~/.ssh/ec2_key.pem \
            docker-compose.prod.yml \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/fallsentinel/docker-compose.prod.yml

          scp -i ~/.ssh/ec2_key.pem \
            db/init/01_schema.sql \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/fallsentinel/db/init/01_schema.sql

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/ec2_key.pem \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            bash -s << 'ENDSSH'
            set -e

            echo "${{ secrets.DOCKER_PASSWORD }}" \
              | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            docker pull ${{ secrets.DOCKER_USERNAME }}/fallsentinel-api:latest

            docker container stop fallsentinel_api fallsentinel_db 2>/dev/null || true
            docker container rm  fallsentinel_api fallsentinel_db 2>/dev/null || true

            cd ~/fallsentinel
            DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}" \
            POSTGRES_HOST_PORT=5435 \
              docker compose -f docker-compose.prod.yml up -d --remove-orphans

            sleep 15
            echo "→ Checking API health on port 8005..."
            curl --fail --silent http://localhost:8005/health | grep '"status":"healthy"'
            echo "✅ Internal smoke test passed"
          ENDSSH

      - name: External smoke test (API :8005)
        run: |
          echo "→ Verifying API externally on http://${{ secrets.EC2_HOST }}:8005/health ..."
          curl --fail --silent --retry 3 --retry-delay 5 \
            "http://${{ secrets.EC2_HOST }}:8005/health" | grep '"status":"healthy"'

          echo "✅ Deployment successful — Fall-Sentinel API live at http://${{ secrets.EC2_HOST }}:8005"
