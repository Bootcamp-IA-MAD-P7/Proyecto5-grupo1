name: Android Release

on:
  push:
    branches: [dev]

defaults:
  run:
    working-directory: Frontend

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

  build-and-release:
    runs-on: ubuntu-latest
    needs: validate
    env:
      APK_PATH: build/app/outputs/flutter-apk/app-release.apk

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.jks

      - name: Write key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.jks
          EOF

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release \
            --build-number=${{ github.run_number }} \
            --build-name=1.0.${{ github.run_number }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: Frontend/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Release v1.0.${{ github.run_number }}"
          body: "Build automático desde commit ${{ github.sha }}"
          files: ${{ env.APK_PATH }}
          draft: false
          prerelease: false
          token: ${{ secrets.GH_PAT }}

  notify-backend:
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - name: Notify backend of new version
        # TODO: eliminar URL Render — migrar a AWS cuando esté desplegado
        run: |
          APK_URL="https://github.com/${{ github.repository }}/releases/download/v1.0.${{ github.run_number }}/app-release.apk"
          curl --fail --silent --show-error \
            -X POST \
            -H "Content-Type: application/json" \
            -d "{
              \"version_code\": ${{ github.run_number }},
              \"version_name\": \"1.0.${{ github.run_number }}\",
              \"apk_url\": \"${APK_URL}\",
              \"release_notes\": \"Build automático desde commit ${{ github.sha }}\"
            }" \
            https://proyecto5-grupo1.onrender.com/app/register-version

  firebase-distribute:
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk
          path: apk

      - name: Deploy to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: apk/app-release.apk
          releaseNotes: "Build automático desde commit ${{ github.sha }}"
