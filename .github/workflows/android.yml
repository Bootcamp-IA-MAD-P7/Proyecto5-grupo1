name: Android Release

# Triggers only when SentiLife CI completes successfully on main.
# All three test suites (Java, Python, Flutter) must have passed first.
on:
  workflow_run:
    workflows: ["SentiLife CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  # Guard: only proceed if the triggering CI workflow succeeded
  gate:
    name: CI passed — proceed with release
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - run: echo "✓ SentiLife CI OK — building Android release"

  # Build signed APK and publish GitHub Release + Firebase distribution
  build-and-release:
    runs-on: ubuntu-latest
    needs: gate
    defaults:
      run:
        working-directory: frontend
    env:
      APK_PATH: build/app/outputs/flutter-apk/app-release.apk

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.jks

      - name: Write key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.jks
          EOF

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release \
            --build-number=${{ github.run_number }} \
            --build-name=1.0.${{ github.run_number }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: frontend/${{ env.APK_PATH }}
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Release v1.0.${{ github.run_number }}"
          body: "Build automático desde commit ${{ github.event.workflow_run.head_sha || github.sha }}"
          files: frontend/${{ env.APK_PATH }}
          draft: false
          prerelease: false
          token: ${{ secrets.GH_PAT }}

  firebase-distribute:
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk
          path: apk

      - name: Deploy to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: apk/app-release.apk
          releaseNotes: "Build automático desde commit ${{ github.event.workflow_run.head_sha || github.sha }}"
