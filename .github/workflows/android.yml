name: Android Release

# Se dispara cuando SentiLife CI termina con éxito en main (API+DB ya desplegados).
on:
  workflow_run:
    workflows: ["SentiLife CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  gate:
    name: Check backend deploy succeeded
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - run: echo "✓ Backend deploy OK — continuando con Android"

  validate:
    runs-on: ubuntu-latest
    needs: gate
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

  # Solo build + artifact. NUNCA llama a GitHub Releases (Unicorn tumba el job).
  build-apk:
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: frontend
    env:
      APK_PATH: build/app/outputs/flutter-apk/app-release.apk
      API_BASE_URL: http://${{ secrets.EC2_HOST }}:8005

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Guard EC2_HOST
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ]; then
            echo "::error::EC2_HOST vacío — el APK no sabría a qué API apuntar"
            exit 1
          fi
          echo "API_BASE_URL=${{ env.API_BASE_URL }}"

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.jks

      - name: Write key.properties
        run: |
          {
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}"
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}"
            echo "keyAlias=${{ secrets.KEY_ALIAS }}"
            echo "storeFile=release.jks"
          } > android/key.properties

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (API = EC2 :8005)
        run: |
          echo "→ Compilando APK contra ${API_BASE_URL}"
          flutter build apk --release \
            --build-number=${{ github.run_number }} \
            --build-name=1.0.${{ github.run_number }} \
            --dart-define=API_BASE_URL=${API_BASE_URL}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: frontend/${{ env.APK_PATH }}
          retention-days: 7

  # Firebase y OTA dependen SOLO del APK — no de GitHub Releases.
  firebase-distribute:
    runs-on: ubuntu-latest
    needs: build-apk
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk
          path: apk

      - name: Deploy to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: apk/app-release.apk
          releaseNotes: "Build automático · API http://${{ secrets.EC2_HOST }}:8005 · commit ${{ github.event.workflow_run.head_sha || github.sha }}"

  # OTA: APK en EC2 + URL estable (no depende de GitHub Releases / Unicorn).
  notify-backend:
    runs-on: ubuntu-latest
    needs: build-apk
    environment: production
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk
          path: apk

      - name: Set up SSH key
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${EC2_HOST:-}" ] || [ -z "${EC2_SSH_KEY:-}" ]; then
            echo "::error::EC2_HOST / EC2_SSH_KEY vacíos (environment production)"
            exit 1
          fi
          EC2_HOST="$(printf '%s' "$EC2_HOST" | tr -d '[:space:]')"
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -T 15 -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Upload APK to EC2 (servido por /app/download.apk)
        run: |
          set -euo pipefail
          ssh -o ServerAliveInterval=30 -i ~/.ssh/ec2_key.pem \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            'mkdir -p ~/sentilife/ota'
          scp -o ServerAliveInterval=30 -i ~/.ssh/ec2_key.pem \
            apk/app-release.apk \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/sentilife/ota/app-release.apk
          echo "✓ APK en EC2 ~/sentilife/ota/app-release.apk"

      - name: Register APK version in Postgres (OTA)
        run: |
          set -euo pipefail
          APK_URL="http://${{ secrets.EC2_HOST }}:8005/app/download.apk"
          curl --fail --silent --show-error --retry 3 --retry-delay 5 \
            -X POST \
            -H "Content-Type: application/json" \
            -d "{
              \"version_code\": ${{ github.run_number }},
              \"version_name\": \"1.0.${{ github.run_number }}\",
              \"apk_url\": \"${APK_URL}\",
              \"release_notes\": \"Build automático desde commit ${{ github.event.workflow_run.head_sha || github.sha }}\"
            }" \
            "http://${{ secrets.EC2_HOST }}:8005/app/register-version"
          echo "✓ OTA registrado → ${APK_URL}"

  # Job aislado: si Unicorn tumba Releases, Firebase ya corrió igual.
  create-github-release:
    runs-on: ubuntu-latest
    needs: build-apk
    continue-on-error: true
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk
          path: apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Release v1.0.${{ github.run_number }}"
          body: |
            Build automático desde commit `${{ github.event.workflow_run.head_sha || github.sha }}`
            API: `http://${{ secrets.EC2_HOST }}:8005`
          files: apk/app-release.apk
          draft: false
          prerelease: false
          token: ${{ secrets.GH_PAT }}
