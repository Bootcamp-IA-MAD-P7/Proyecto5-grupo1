name: Android Release

# Todo el CI/CD de Android corre solo en main, después de que la API QA esté arriba.
on:
  push:
    branches: [main]
  workflow_dispatch:

defaults:
  run:
    working-directory: Frontend

jobs:
  wait-for-api:
    name: Wait for QA API (DB + backend)
    runs-on: ubuntu-latest
    steps:
      - name: Wait until API is healthy on EC2
        run: |
          echo "→ Esperando API QA en http://${{ secrets.EC2_HOST }}:8005 ..."
          echo "  (corre en paralelo con backend-ci deploy en el mismo push a main)"
          for i in $(seq 1 30); do
            if curl --fail --silent --max-time 10 \
              "http://${{ secrets.EC2_HOST }}:8005/health" | grep -q '"status":"healthy"'; then
              echo "✓ API QA lista (intento $i)"
              exit 0
            fi
            echo "Intento $i/30 — deploy backend en curso o API caída, reintento en 15s..."
            sleep 15
          done
          echo "✗ API QA no respondió a tiempo." >&2
          exit 1

  validate:
    runs-on: ubuntu-latest
    needs: wait-for-api
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

  build-and-release:
    runs-on: ubuntu-latest
    needs: validate
    env:
      APK_PATH: build/app/outputs/flutter-apk/app-release.apk

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.jks

      - name: Write key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.jks
          EOF

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release \
            --build-number=${{ github.run_number }} \
            --build-name=1.0.${{ github.run_number }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: Frontend/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Release v1.0.${{ github.run_number }}"
          body: "Build automático desde commit ${{ github.sha }}"
          files: ${{ env.APK_PATH }}
          draft: false
          prerelease: false
          token: ${{ secrets.GH_PAT }}

  notify-backend:
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - name: Register APK version in Postgres (OTA)
        run: |
          APK_URL="https://github.com/${{ github.repository }}/releases/download/v1.0.${{ github.run_number }}/app-release.apk"
          curl --fail --silent --show-error --retry 3 --retry-delay 5 \
            -X POST \
            -H "Content-Type: application/json" \
            -d "{
              \"version_code\": ${{ github.run_number }},
              \"version_name\": \"1.0.${{ github.run_number }}\",
              \"apk_url\": \"${APK_URL}\",
              \"release_notes\": \"Build automático desde commit ${{ github.sha }}\"
            }" \
            "http://${{ secrets.EC2_HOST }}:8005/app/register-version"
          echo "✓ Versión registrada en Postgres (OTA)"

  firebase-distribute:
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk
          path: apk

      - name: Deploy to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: apk/app-release.apk
          releaseNotes: "Build automático desde commit ${{ github.sha }}"
