name: Android Release

# Se dispara cuando backend-ci termina con éxito en main (API+DB ya desplegados).
on:
  workflow_run:
    workflows: ["Deploy Fall-Sentinel API to EC2"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  gate:
    name: Check backend deploy succeeded
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - run: echo "✓ Backend deploy OK — continuando con Android"

  validate:
    runs-on: ubuntu-latest
    needs: gate
    defaults:
      run:
        working-directory: Frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

  build-and-release:
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: Frontend
    env:
      APK_PATH: build/app/outputs/flutter-apk/app-release.apk

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.jks

      - name: Write key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.jks
          EOF

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release \
            --build-number=${{ github.run_number }} \
            --build-name=1.0.${{ github.run_number }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: Frontend/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Release v1.0.${{ github.run_number }}"
          body: "Build automático desde commit ${{ github.event.workflow_run.head_sha || github.sha }}"
          files: ${{ env.APK_PATH }}
          draft: false
          prerelease: false
          token: ${{ secrets.GH_PAT }}

  notify-backend:
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - name: Register APK version in Postgres (OTA)
        run: |
          APK_URL="https://github.com/${{ github.repository }}/releases/download/v1.0.${{ github.run_number }}/app-release.apk"
          curl --fail --silent --show-error --retry 3 --retry-delay 5 \
            -X POST \
            -H "Content-Type: application/json" \
            -d "{
              \"version_code\": ${{ github.run_number }},
              \"version_name\": \"1.0.${{ github.run_number }}\",
              \"apk_url\": \"${APK_URL}\",
              \"release_notes\": \"Build automático desde commit ${{ github.event.workflow_run.head_sha || github.sha }}\"
            }" \
            "http://${{ secrets.EC2_HOST }}:8005/app/register-version"
          echo "✓ Versión registrada en Postgres (OTA)"

  firebase-distribute:
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk
          path: apk

      - name: Deploy to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: apk/app-release.apk
          releaseNotes: "Build automático desde commit ${{ github.event.workflow_run.head_sha || github.sha }}"
