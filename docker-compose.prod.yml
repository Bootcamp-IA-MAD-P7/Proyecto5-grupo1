# SentiLife — QA/Production on EC2
# Ports (Security Group inbound):
#   Java API  → host 8005 → container 8080
#   DB        → host 5435 → container 5432 (debug only)
#   Grafana   → host 3006 → container 3000
#   Inference, RabbitMQ, Prometheus → internal only
#
# Other projects on same EC2 (34.235.130.33):
#   Unicorn Valuation — frontend 3005, API 8004, Postgres 5434

name: sentilife

services:
  # ── PostgreSQL ─────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: sentilife-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fallsentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fallsentinel123}
      POSTGRES_DB: ${POSTGRES_DB:-fallsentinel}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_HOST_PORT:-5435}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fallsentinel} -d ${POSTGRES_DB:-fallsentinel}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ── RabbitMQ ───────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: sentilife-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

  # ── Backend Java ───────────────────────────────────────────────
  backend-java:
    image: ${DOCKER_USERNAME}/sentilife-java:latest
    container_name: sentilife-backend-java
    ports:
      - "${JAVA_HOST_PORT:-8005}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_USER: ${POSTGRES_USER:-fallsentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fallsentinel123}
      POSTGRES_DB: ${POSTGRES_DB:-fallsentinel}
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      JWT_SECRET: ${JWT_SECRET}
      INFERENCE_URL: http://api:8000
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # ── FastAPI Inference (ML only — no DB) ─────────────────────────
  api:
    image: ${DOCKER_USERNAME}/sentilife-inference:latest
    container_name: sentilife-inference
    environment:
      MODEL_PATH: ${MODEL_PATH:-ml/models/model.pkl}
      MODEL_VERSION: ${MODEL_VERSION:-baseline-v1}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── Prometheus ─────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: sentilife-prometheus
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    depends_on:
      backend-java:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Grafana ────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: sentilife-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_HOST_PORT:-3006}:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  pgdata:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
