# SentiLife — development stack (all services)
# Usage: cp .env.example .env && docker compose up

name: sentilife

services:
  # ── PostgreSQL ─────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: sentilife-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fallsentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fallsentinel123}
      POSTGRES_DB: ${POSTGRES_DB:-fallsentinel}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fallsentinel} -d ${POSTGRES_DB:-fallsentinel}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ── RabbitMQ (management + prometheus plugin) ──────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: sentilife-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "${RABBITMQ_AMQP_PORT:-5673}:5672"
      - "${RABBITMQ_MGMT_PORT:-15673}:15672"   # management UI
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

  # ── Backend Java (Spring Boot 3) ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentilife-backend
    ports:
      - "${JAVA_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_USER: ${POSTGRES_USER:-fallsentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fallsentinel123}
      POSTGRES_DB: ${POSTGRES_DB:-fallsentinel}
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production-min-32-chars-long!!}
      INFERENCE_URL: http://api:8000
      FIREBASE_SERVICE_ACCOUNT: /app/config/firebase-service-account.json
    volumes:
      - ./backend/config:/app/config:ro
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # ── FastAPI Inference Service (ML only — no DB) ─────────────────
  api:
    build:
      context: ./inference
      dockerfile: Dockerfile
    container_name: sentilife-inference
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "${PORT:-8000}:8000"
    environment:
      MODEL_PATH: ${MODEL_PATH:-ml/models/model.pkl}
      MODEL_VERSION: ${MODEL_VERSION:-baseline-v1}
    volumes:
      - ./inference:/app
      - ./contracts:/contracts:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── Prometheus ─────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: sentilife-prometheus
    volumes:
      - ./backend/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Grafana ────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: sentilife-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./backend/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./backend/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  pgdata:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
