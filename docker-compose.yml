# Fall-Sentinel — desarrollo local
# Uso: cp .env.example .env && make up

name: fallsentinel

services:
  db:
    image: postgres:16-alpine
    container_name: fallsentinel-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fallsentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fallsentinel123}
      POSTGRES_DB: ${POSTGRES_DB:-fallsentinel}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fallsentinel} -d ${POSTGRES_DB:-fallsentinel}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: fallsentinel-api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fallsentinel}:${POSTGRES_PASSWORD:-fallsentinel123}@db:5432/${POSTGRES_DB:-fallsentinel}
      MODEL_PATH: ${MODEL_PATH:-ml/model.pkl}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_KEY: ${SUPABASE_KEY:-}
    volumes:
      - ./Backend:/app
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  pgdata:
