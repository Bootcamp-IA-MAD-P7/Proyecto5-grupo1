# Test profile — uses H2 in-memory database, no PostgreSQL or RabbitMQ needed.
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  # Disable RabbitMQ auto-configuration in tests
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

  # Disable RabbitMQ entirely (prevents @RabbitListener from starting)
  rabbitmq:
    listener:
      simple:
        auto-startup: false

sentilife:
  jwt:
    secret: test-secret-key-min-32-chars-for-testing-only!!
    access-token-expiration: 900
    refresh-token-expiration: 604800
    device-token-expiration: 7776000
  inference:
    url: http://localhost:8000
  firebase:
    service-account-path:
