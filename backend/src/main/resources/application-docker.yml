# Perfil activo dentro de Docker Compose.
# Sobreescribe solo lo que cambia respecto a application.yml.

spring:
  datasource:
    url: jdbc:postgresql://db:5432/${POSTGRES_DB:fallsentinel}
    username: ${POSTGRES_USER:fallsentinel}
    password: ${POSTGRES_PASSWORD:fallsentinel123}

  flyway:
    baseline-on-migrate: false

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

# En EC2 compartido RabbitMQ puede ir lento; no debe marcar el API como DOWN
# (bloquea healthcheck Docker, Prometheus/Grafana y el job de deploy en CI).
management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    rabbit:
      enabled: false

server:
  port: 8080

sentilife:
  inference:
    url: http://api:8000
    fail-fast: ${INFERENCE_FAIL_FAST:false}
  firebase:
    service-account-path: ${FIREBASE_SERVICE_ACCOUNT:/app/config/firebase-service-account.json}
