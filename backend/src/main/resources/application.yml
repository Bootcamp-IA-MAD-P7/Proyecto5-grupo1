spring:
  application:
    name: sentilife-backend

  # ── Base de datos ──────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/fallsentinel
    username: fallsentinel
    password: fallsentinel123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway gestiona el esquema
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── Flyway ────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    # El init legacy (app_versions) + baseline-on-migrate saltaba V1 y V2 fallaba.

  # ── RabbitMQ ──────────────────────────────────────────────────
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /

# ── Actuator ────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# ── Servidor ─────────────────────────────────────────────────────
server:
  port: 8080

# ── OpenAPI / Swagger UI ─────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

# ── JWT ──────────────────────────────────────────────────────────
sentilife:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-in-production-min-32-chars!!}
    access-token-expiration: 900      # 15 minutos en segundos
    refresh-token-expiration: 604800  # 7 días en segundos

  # ── FastAPI inferencia (interna) ─────────────────────────────
  inference:
    url: ${INFERENCE_URL:http://localhost:8000}

  # ── Firebase (push notifications) ──────────────────────────
  firebase:
    service-account-path: ${FIREBASE_SERVICE_ACCOUNT:}
